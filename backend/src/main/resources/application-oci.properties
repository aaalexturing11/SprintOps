# Perfil: SPRING_PROFILES_ACTIVE=oci
# Sin archivos de secret: todo viene de variables de entorno (export en shell o env: en el Deployment).
# No pegues tokens aquí; usa export ... en Cloud Shell o las mismas variables en oci/k8s + deploy.sh.

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.sql.init.mode=never

groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

app.telegram.bot-token=${APP_TELEGRAM_BOT_TOKEN:}
# Sin secret_token de webhook: no definas app.telegram.webhook-secret (TelegramController lo deja vacío).
app.telegram.bot-username=${APP_TELEGRAM_BOT_USERNAME:}

app.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}

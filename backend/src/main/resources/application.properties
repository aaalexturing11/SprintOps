spring.application.name=sprintops-backend
# OCI DevOps / OKE: raíz build_spec.yaml, backend/Dockerfile, backend/oci/*. En contenedor usar SPRING_PROFILES_ACTIVE=oci (application-oci.properties).

# Carga opcional de secretos solo en tu máquina (archivo ignorado por Git). Ahí pon GOOGLE_CLIENT_ID y GOOGLE_CLIENT_SECRET.
spring.config.import=optional:classpath:application-local.properties

# Fotos del daily en cronograma (multipart)
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB

# Configuracion del servidor
server.port=8080

# Configuracion de la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sprintops_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Contraseña: SPRING_DATASOURCE_PASSWORD o application-local.properties (no subir secretos a Git).
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion JPA/Hibernate (show-sql=false evita miles de líneas en consola por cada request; pon true en application-local si depuras SQL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Groq (chatbot). GROQ_API_KEY en entorno o application-local.properties.
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# Portadas de cards de proyecto (disco; visibles para todo el equipo)
app.project-card-cover-dir=uploads/project-card-covers

# Telegram: un solo bot para todos (token de @BotFather). Webhook: POST /api/telegram/webhook
# Opcional: app.telegram.bot-username=nombre_bot (sin @) para deep links desde la app
# Opcional: app.telegram.webhook-secret=... (mismo valor que setWebhook secret_token)
#app.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
#app.telegram.bot-username=sprintops_bot
#app.telegram.webhook-secret=

# OAuth2 (Google y/o GitHub): GOOGLE_CLIENT_*, GITHUB_CLIENT_* en entorno o application-local.properties.
# Ver docs en application-local.properties.example.

# Registro / verificación de correo (enlace en el email apunta al frontend)
app.frontend-base-url=http://localhost:5173
app.mail.from=noreply@localhost

# Opcional: descomenta y configura para enviar correos reales
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=
# spring.mail.password=
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# SQL initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
